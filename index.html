<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEAP QUEST - Vocabulary RPG -</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --primary-color: #38bdf8;
            --text-color: #f8fafc;
            --accent-color: #f43f5e;
            --success-color: #10b981;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--container-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 2px solid var(--border-color);
        }

        /* スクリーン管理 */
        .screen {
            display: none;
            padding: 24px;
        }

        .screen.active {
            display: block;
        }

        /* タイトル画面 */
        #start-screen {
            text-align: center;
            padding: 48px 24px;
        }

        .game-title {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
        }

        .game-subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        /* バトルステータス */
        .battle-hud {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
            background: rgba(0,0,0,0.2);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .character-status h3 {
            font-size: 0.9rem;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .hp-bar-bg {
            height: 12px;
            background-color: #475569;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 4px;
        }

        .hp-bar {
            height: 100%;
            background-color: var(--success-color);
            width: 100%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .hp-bar.danger {
            background-color: var(--accent-color);
        }

        .hp-text {
            font-size: 0.85rem;
            text-align: right;
            margin-top: 2px;
            color: #cbd5e1;
        }

        /* バトルログ・演出 */
        .battle-stage {
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #0f172a, #1e293b);
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .enemy-sprite {
            font-size: 3.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 問題エリア */
        .question-box {
            background-color: rgba(15, 23, 42, 0.6);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary-color);
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question-text {
            font-size: 1.15rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .question-hint {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 8px;
        }

        /* 選択肢ボタン */
        .choices-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .btn {
            background-color: #334155;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 14px 20px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            width: 100%;
        }

        .btn:hover:not(:disabled) {
            background-color: #475569;
            border-color: var(--primary-color);
            transform: translateY(-1px);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: #0f172a;
            font-weight: bold;
            text-align: center;
        }

        .btn-primary:hover {
            background-color: #7dd3fc;
        }

        /* フィードバック & 解説 */
        .feedback-box {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback-box.correct {
            display: block;
            background-color: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--success-color);
            color: #34d399;
        }

        .feedback-box.incorrect {
            display: block;
            background-color: rgba(244, 63, 94, 0.15);
            border: 1px solid var(--accent-color);
            color: #fb7185;
        }

        .commentary-text {
            margin-top: 8px;
            color: var(--text-color);
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        /* 結果画面 */
        .result-stats {
            margin: 24px 0;
            background-color: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .result-row:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div id="start-screen" class="screen active">
        <h1 class="game-title">Leap Quest</h1>
        <p class="game-subtitle">- Vocabulary RPG -</p>
        <button class="btn btn-primary" onclick="startGame()">冒険に出る</button>
    </div>

    <div id="battle-screen" class="screen">
        <div class="battle-hud">
            <div class="character-status">
                <h3>Hero (Player)</h3>
                <div class="hp-bar-bg">
                    <div id="player-hp-bar" class="hp-bar"></div>
                </div>
                <div id="player-hp-text" class="hp-text">10 / 10</div>
            </div>
            <div class="character-status">
                <h3 id="enemy-name">Monster</h3>
                <div class="hp-bar-bg">
                    <div id="enemy-hp-bar" class="hp-bar"></div>
                </div>
                <div id="enemy-hp-text" class="hp-text">5 / 5</div>
            </div>
        </div>

        <div class="battle-stage">
            <div id="enemy-avatar" class="enemy-sprite">😈</div>
        </div>

        <div class="question-box">
            <div id="question-text" class="question-text"></div>
            <div id="question-hint" class="question-hint"></div>
        </div>

        <div id="choices-container" class="choices-grid">
            </div>

        <div id="feedback-box" class="feedback-box">
            <strong id="feedback-title">正解！</strong>
            <div id="commentary-content" class="commentary-text"></div>
            <button id="next-btn" class="btn btn-primary" style="margin-top: 16px; width: 100%;" onclick="advanceTurn()">次へ進む</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h2 class="game-title" style="font-size: 2rem; text-align: center;" id="result-title">Quest Clear!</h2>
        <div class="result-stats">
            <div class="result-row">
                <span>倒したモンスター:</span>
                <strong id="result-enemies">0 体</strong>
            </div>
            <div class="result-row">
                <span>正解数:</span>
                <strong id="result-score">0 / 0</strong>
            </div>
        </div>
        <button class="btn btn-primary" style="width: 100%;" onclick="resetGame()">タイトルへ戻る</button>
    </div>
</div>

<script>
    // --- 写真データから抽出した全62単語のデータベース ---
    const quizData = [
      // --- 1枚目・2枚目 ---
      { word: "habit", meaning: "（個人の）習慣、癖", sentence: "have a habit of making excuses", translation: "言い訳をする癖がある" },
      { word: "custom", meaning: "（社会的な）習慣、税関", sentence: "show what is in my suitcase at customs", translation: "税関でスーツケースの中を見せる" },
      { word: "tradition", meaning: "伝統、しきたり", sentence: "Japanese traditions", translation: "日本の伝統" },
      { word: "society", meaning: "社会、協会、団体", sentence: "women's status in society", translation: "社会での女性の地位" },
      { word: "law", meaning: "法律、国法、法則", sentence: "Parking here is against the law.", translation: "ここでの駐車は法律違反だ。" },
      { word: "ancestor", meaning: "祖先、先祖", sentence: "My ancestors were French.", translation: "私の祖先はフランス人だった。" },
      { word: "population", meaning: "人口、個体数", sentence: "The population of Tokyo is larger than that of Osaka.", translation: "東京の人口は大阪の人口より多い。" },
      { word: "native", meaning: "母国の、その土地の生まれの", sentence: "his native language", translation: "彼の母国語" },
      { word: "abroad", meaning: "海外へ、海外で", sentence: "find a job abroad", translation: "海外で仕事を見つける" },
      { word: "local", meaning: "その土地の、地元の", sentence: "talk with the locals", translation: "地元の人々と話す" },
      { word: "survey", meaning: "調査、アンケート", sentence: "according to a recent survey", translation: "最近の調査によると" },
      { word: "value", meaning: "価値、価格、価値観", sentence: "the value of the painting", translation: "その絵の価値" },
      { word: "treasure", meaning: "財宝、宝、大事なもの", sentence: "a national treasure", translation: "国宝" },
      { word: "fashion", meaning: "流行、ファッション、やり方", sentence: "follow the latest fashion", translation: "最新の流行を追う" },
      { word: "public", meaning: "大衆の、公の、公共の", sentence: "public places", translation: "公共の場所" },

      // --- 3枚目（政治） ---
      { word: "evidence", meaning: "証拠、根拠", sentence: "There is no evidence to support his story.", translation: "彼の話を裏づける証拠はない。" },
      { word: "vote", meaning: "投票、投票権", sentence: "the right to vote", translation: "投票する権利" },
      { word: "government", meaning: "政府、政権", sentence: "the Japanese government", translation: "日本政府" },
      { word: "nation", meaning: "国家、国、国民", sentence: "the most powerful nation in the world", translation: "世界で一番力のある国" },
      { word: "capital", meaning: "首都、資本、大文字", sentence: "What is the capital of Canada?", translation: "カナダの首都はどこですか。" },
      { word: "state", meaning: "状態、国家、州", sentence: "the United States of America", translation: "アメリカ合衆国" },
      { word: "political", meaning: "政治的な、政治の", sentence: "the political situation in Russia", translation: "ロシアの政治情勢" },

      // --- 4枚目（経済） ---
      { word: "price", meaning: "価格、物価、代償", sentence: "Prices have gone up by 5%.", translation: "物価が5%上がった。" },
      { word: "sum", meaning: "金額、合計、要約", sentence: "pay a large sum for antiques", translation: "骨とう品に大金を使う" },
      { word: "budget", meaning: "予算、家計", sentence: "our budget for this trip", translation: "今回の旅の予算" },
      { word: "fee", meaning: "料金、謝礼、授業料", sentence: "pay a cancellation fee", translation: "キャンセル料を払う" },
      { word: "fare", meaning: "運賃（乗り物の）", sentence: "Taxi fares are low in Singapore.", translation: "シンガポールのタクシー料金は安い。" },
      { word: "bill", meaning: "勘定書、請求書、紙幣", sentence: "the phone bill", translation: "電話代の請求書" },
      { word: "trade", meaning: "貿易、商売、取引", sentence: "Japan's trade with the U.S.", translation: "日本の対米貿易" },
      { word: "wealth", meaning: "富、財産、豊富", sentence: "achieve wealth and power", translation: "富と権力を手にする" },
      { word: "economy", meaning: "経済、節約", sentence: "boost the Japanese economy", translation: "日本経済を活性化する" },

      // --- 5枚目（仕事・損害） ---
      { word: "cost", meaning: "費用、代償、犠牲", sentence: "The suit cost me 500 dollars.", translation: "そのスーツは私に500ドルした（かかった）。" },
      { word: "company", meaning: "会社、同席すること、仲間", sentence: "work for a big company", translation: "大きな会社で働く" },
      { word: "task", meaning: "仕事、任務、課題", sentence: "accomplish a difficult task", translation: "困難な仕事を成し遂げる" },
      { word: "earn", meaning: "（お金を）稼ぐ、得る", sentence: "earn money to pay my school fees", translation: "学費を払うお金を稼ぐ" },
      { word: "hurt", meaning: "痛む、傷つける", sentence: "My back hurts a lot.", translation: "腰がとても痛い。" },
      { word: "injure", meaning: "〜を痛める、けがをさせる", sentence: "injure my back", translation: "腰を痛める" },
      { word: "damage", meaning: "〜に損害を与える", sentence: "seriously damage the environment", translation: "環境に深刻な被害を与える" },

      // --- 6枚目（破壊・人） ---
      { word: "destroy", meaning: "〜を破壊する、滅ぼす", sentence: "destroy all weapons", translation: "すべての武器を破壊する" },
      { word: "ruin", meaning: "〜を台無しにする、破滅させる", sentence: "You ruined my plan.", translation: "君のせいで計画が台無しだよ。" },
      { word: "danger", meaning: "危険、脅威", sentence: "Tigers are in danger of extinction.", translation: "トラが絶滅の危機にある。" },
      { word: "neighbor", meaning: "近所の人、隣人", sentence: "chat with a neighbor", translation: "近所の人と話す" },
      { word: "audience", meaning: "聴衆、観客", sentence: "draw a large audience", translation: "大観衆を集める" },
      { word: "crowd", meaning: "群衆、人混み", sentence: "A crowd rushed into the hall.", translation: "群衆が会場になだれ込んだ。" },
      { word: "author", meaning: "著者、作者", sentence: "the author of War and Peace", translation: "『戦争と平和』の著者" },
      { word: "staff", meaning: "職員、社員、スタッフ", sentence: "Most of the staff are from Australia.", translation: "職員の大半はオーストラリア出身です。" },
      { word: "clerk", meaning: "店員、事務員", sentence: "the clerks at that department store", translation: "あのデパートの店員" },

      // --- 7枚目（移動） ---
      { word: "customer", meaning: "客、顧客", sentence: "The restaurant was crowded with customers from abroad.", translation: "そのレストランは外国人客で混雑していた。" },
      { word: "passenger", meaning: "乗客", sentence: "There were a lot of passengers on the train.", translation: "列車には多くの乗客が乗っていた。" },
      { word: "elderly", meaning: "年配の、高齢の", sentence: "give up my seat to elderly people", translation: "お年寄りに席を譲る" },
      { word: "female", meaning: "女性の、雌の", sentence: "female workers", translation: "女性の労働者" },
      { word: "head", meaning: "向かう、〜を率いる", sentence: "head for the beach", translation: "海辺に向かう" },
      { word: "follow", meaning: "〜の後について行く、従う", sentence: "Someone was following me.", translation: "誰かが私をつけていた。" },
      { word: "wander", meaning: "歩き回る、さまよう", sentence: "wander about the town", translation: "街をぶらぶら歩き回る" },
      { word: "travel", meaning: "旅行する、移動する", sentence: "travel around the world", translation: "世界中を旅する" },

      // --- 8枚目（確実性・直面） ---
      { word: "pass", meaning: "通り過ぎる、合格する、手渡す", sentence: "pass the post office", translation: "郵便局の前を通り過ぎる" },
      { word: "likely", meaning: "〜しそうだ、可能性が高い", sentence: "Things are likely to improve.", translation: "事態はよくなりそうだ。" },
      { word: "natural", meaning: "当然の、自然の、生まれながらの", sentence: "It is only natural that you cannot catch words you do not know.", translation: "知らない単語を聞き取れないのはごく当然のことだ。" },
      { word: "certain", meaning: "確かな、一定の", sentence: "He is certain to become a star player.", translation: "彼はきっとスター選手になるよ。" },
      { word: "probably", meaning: "おそらく、たぶん", sentence: "The repairs will probably take a month.", translation: "修理はおそらく1か月はかかるだろう。" },
      { word: "face", meaning: "〜に直面する、向きである", sentence: "We are faced with a crisis.", translation: "私たちは危機に直面している。" },
      { word: "avoid", meaning: "〜を避ける", sentence: "Avoid making eye contact with monkeys.", translation: "サルとは目を合わせないようにしなさい（避ける）。" }
    ];

    const enemies = [
        { name: "スライムゴブリン", emoji: "🤢", maxHp: 3 },
        { name: "シャドウバット", emoji: "🦇", maxHp: 4 },
        { name: "マインゴーレム", emoji: "🤖", maxHp: 5 },
        { name: "ダークナイト", emoji: "😈", maxHp: 6 },
        { name: "レックスドラゴン", emoji: "🦖", maxHp: 8 }
    ];

    // ゲーム状態管理変数
    let currentWordsPool = [];
    let currentQuizIndex = 0;
    let currentQuizItem = null;
    
    let playerHp = 15;
    const playerMaxHp = 15;
    let enemyHp = 0;
    let enemyMaxHp = 0;
    let defeatedEnemiesCount = 0;
    let totalQuestionsAnswered = 0;
    let correctAnswersCount = 0;

    // 画面切り替え関数
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // 配列のシャッフル
    function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // ゲームスタート
    function startGame() {
        // 出題プールをランダムにシャッフルしてセット
        currentWordsPool = shuffleArray(quizData);
        currentQuizIndex = 0;
        
        // ステータス初期化
        playerHp = playerMaxHp;
        defeatedEnemiesCount = 0;
        totalQuestionsAnswered = 0;
        correctAnswersCount = 0;

        updatePlayerHpBar();
        spawnEnemy();
        showScreen('battle-screen');
        loadNextQuestion();
    }

    // モンスターの出現
    function spawnEnemy() {
        // エネミーリストからランダムで選択、後半ほどHPが高くなるように少し調整も可能
        const baseEnemy = enemies[Math.floor(Math.random() * enemies.length)];
        document.getElementById('enemy-name').textContent = baseEnemy.name;
        document.getElementById('enemy-avatar').textContent = baseEnemy.emoji;
        
        enemyMaxHp = baseEnemy.maxHp;
        enemyHp = enemyMaxHp;
        updateEnemyHpBar();
    }

    // HPバーの更新
    function updatePlayerHpBar() {
        const percent = Math.max(0, (playerHp / playerMaxHp) * 100);
        const bar = document.getElementById('player-hp-bar');
        bar.style.width = percent + '%';
        document.getElementById('player-hp-text').textContent = `${playerHp} / ${playerMaxHp}`;
        
        if (percent <= 30) bar.classList.add('danger');
        else bar.classList.remove('danger');
    }

    function updateEnemyHpBar() {
        const percent = Math.max(0, (enemyHp / enemyMaxHp) * 100);
        const bar = document.getElementById('enemy-hp-bar');
        bar.style.width = percent + '%';
        document.getElementById('enemy-hp-text').textContent = `${enemyHp} / ${enemyMaxHp}`;
    }

    // クイズの読み込み
    function loadNextQuestion() {
        // フィードバック非表示
        document.getElementById('feedback-box').style.display = 'none';

        // 問題プールが尽きたら再シャッフルしてループ
        if (currentQuizIndex >= currentWordsPool.length) {
            currentWordsPool = shuffleArray(quizData);
            currentQuizIndex = 0;
        }

        currentQuizItem = currentWordsPool[currentQuizIndex];
        currentQuizIndex++;

        // 例文のターゲット単語部分を `___` に置換して問題文を作成
        // 大文字小文字（例: Prices など）や複数形、過去形にもなるべく対応できるように正規表現で部分置換
        const targetWord = currentQuizItem.word;
        const escapedWord = targetWord.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        // 単語の語幹に近い部分でマッチさせる簡易的な正規表現
        const regex = new RegExp(escapedWord.substring(0, Math.min(4, escapedWord.length)) + '[a-z]*', 'gi');
        
        let questionSentence = currentQuizItem.sentence.replace(regex, "___");
        // 万が一置換されなかった場合のエスケープ処理
        if (!questionSentence.includes("___")) {
            questionSentence = questionSentence.replace(targetWord, "___");
        }

        document.getElementById('question-text').textContent = questionSentence;
        document.getElementById('question-hint').textContent = `意味：${currentQuizItem.translation}`;

        // 選択肢の生成（正解の日本語 + ダミーの日本語3つ）
        let choices = [currentQuizItem.meaning];
        
        // ダミーをプールからランダムに3つ選ぶ
        let dummyPool = quizData.filter(item => item.word !== currentQuizItem.word);
        dummyPool = shuffleArray(dummyPool);
        
        for (let i = 0; i < 3 && i < dummyPool.length; i++) {
            choices.push(dummyPool[i].meaning);
        }
        
        // 選択肢をシャッフル
        choices = shuffleArray(choices);

        // ボタンの配置
        const container = document.getElementById('choices-container');
        container.innerHTML = '';
        container.style.display = 'grid';

        choices.forEach(choice => {
            const button = document.createElement('button');
            button.className = 'btn';
            button.textContent = choice;
            button.onclick = () => selectAnswer(choice, button);
            container.appendChild(button);
        });
    }

    // 選択肢をクリックしたとき
    function selectAnswer(selectedChoice, selectedButton) {
        // ボタンをすべて無効化
        const buttons = document.querySelectorAll('#choices-container .btn');
        buttons.forEach(b => b.disabled = true);

        const isCorrect = (selectedChoice === currentQuizItem.meaning);
        totalQuestionsAnswered++;

        const feedbackBox = document.getElementById('feedback-box');
        const feedbackTitle = document.getElementById('feedback-title');
        const commentaryContent = document.getElementById('commentary-content');

        if (isCorrect) {
            correctAnswersCount++;
            enemyHp -= 1; // モンスターに1ダメージ
            updateEnemyHpBar();

            feedbackBox.className = "feedback-box correct";
            feedbackTitle.textContent = "⚔️ ATTACK SUCCESS !! (正解)";
            selectedButton.style.borderColor = "var(--success-color)";
            selectedButton.style.backgroundColor = "rgba(16, 185, 129, 0.2)";
        } else {
            playerHp -= 2; // プレイヤーに2ダメージ
            updatePlayerHpBar();

            feedbackBox.className = "feedback-box incorrect";
            feedbackTitle.textContent = "💥 PLAYER DAMAGED !! (不正解)";
            selectedButton.style.borderColor = "var(--accent-color)";
            selectedButton.style.backgroundColor = "rgba(244, 63, 94, 0.2)";
        }

        // 解説テキストの構築
        commentaryContent.textContent = `【単語】 ${currentQuizItem.word} : ${currentQuizItem.meaning}\n【元の例文】 ${currentQuizItem.sentence}\n【例文の訳】 ${currentQuizItem.translation}`;
        
        // 選択肢を非表示にしてフィードバックを表示
        document.getElementById('choices-container').style.display = 'none';
        feedbackBox.style.display = 'block';
    }

    // ターンを進める（次へボタンを押した時）
    function advanceTurn() {
        if (enemyHp <= 0) {
            // 敵を倒した場合
            defeatedEnemiesCount++;
            alert("モンスターを倒した！次のモンスターが現れた！");
            spawnEnemy();
            loadNextQuestion();
        } else if (playerHp <= 0) {
            // プレイヤーが倒された場合
            endGame(false);
        } else {
            // バトル継続
            loadNextQuestion();
        }
    }

    // ゲーム終了
    function endGame(isClear) {
        const title = document.getElementById('result-title');
        if (playerHp <= 0) {
            title.textContent = "Game Over...";
            title.style.color = "var(--accent-color)";
        } else {
            title.textContent = "Quest Clear!";
            title.style.color = "var(--primary-color)";
        }

        document.getElementById('result-enemies').textContent = defeatedEnemiesCount + " 体";
        document.getElementById('result-score').textContent = `${correctAnswersCount} / ${totalQuestionsAnswered} 問`;
        
        showScreen('result-screen');
    }

    // タイトルへ戻る
    function resetGame() {
        showScreen('start-screen');
    }
</script>

</body>
</html>
