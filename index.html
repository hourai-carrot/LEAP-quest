<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英単語 4択クイズゲーム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .game-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 20px; }
        .word-display { font-size: 32px; font-weight: bold; color: #2b6cb0; margin-bottom: 10px; }
        .sentence-display { font-size: 16px; color: #4a5568; margin-bottom: 25px; font-style: italic; min-height: 40px; }
        .choices-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 25px; }
        button {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background-color: white;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }
        button:hover { background-color: #ebf8ff; border-color: #bee3f8; }
        .score-display { font-size: 18px; color: #718096; margin-top: 20px; }
        .btn-control { background-color: #48bb78; color: white; border: none; margin-top: 15px; }
        .btn-control:hover { background-color: #38a169; }
        .audio-controls { margin-top: 15px; font-size: 14px; color: #718096; }
    </style>
</head>
<body>

<div class="game-container">
    <h1 id="title">英単語クイズ</h1>
    <div id="game-zone">
        <div class="word-display" id="word">Word</div>
        <div class="sentence-display" id="sentence">Sentence</div>
        <div class="choices-grid" id="choices"></div>
        <div class="score-display" id="score">スコア: 0 / 0</div>
    </div>
    <button id="restart-btn" class="btn-control" style="display:none;" onclick="restartGame()">もう一度挑戦する</button>
    <div class="audio-controls">
        🎵 BGM音量: <input type="range" id="volume" min="0" max="1" step="0.1" value="0.3" onchange="adjustVolume(this.value)">
    </div>
</div>

<audio id="bgm" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<script>

  { id: "124", word: "face", meaning: "〜に直面する、向き合う、顔", sentence: "We are faced with a crisis.", translation: "私たちは危機に直面している。", choices: ["〜に直面する", "避ける", "向かう", "痛む"] },
  { id: "125", word: "avoid", meaning: "〜を避ける、回避する", sentence: "Avoid making eye contact with monkeys.", translation: "サルとは目を合わせないようにしなさい。", choices: ["〜を避ける、回避する", "直面する", "向かう", "破壊する"] }
];

let currentQuestionIndex = 0;
let score = 0;
let shuffledVocabulary = [];
const bgm = document.getElementById('bgm');

// 配列をシャッフルする関数
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[array[j]]] = [array[j], array[i]];
    }
    return array;
}

// ゲーム開始（BGMバグ修正：ユーザーが画面を操作した瞬間に新しく再生開始させる）
function startGame() {
    shuffledVocabulary = shuffleArray([...vocabulary]);
    currentQuestionIndex = 0;
    score = 0;
    
    document.getElementById('game-zone').style.display = 'block';
    document.getElementById('restart-btn').style.display = 'none';
    document.getElementById('title').innerText = "英単語クイズ";

    // 【重要バグ修正】
    // 曲を最初から確実に再生し直すため、一度 currentTime をリセットして play() を呼ぶ
    bgm.currentTime = 0; 
    bgm.play().catch(error => {
        console.log("BGM自動再生のブロック対策:", error);
    });

    showQuestion();
}

// 問題を表示
function showQuestion() {
    const currentQuestion = shuffledVocabulary[currentQuestionIndex];
    
    // 単語の表示
    document.getElementById('word').innerText = currentQuestion.word;
    
    // 例文と訳の表示
    document.getElementById('sentence').innerHTML = `${currentQuestion.sentence}<br><span style="font-size:13px; color:#a0aec0; font-style:normal;">(${currentQuestion.translation})</span>`;
    
    // 選択肢の表示（毎回ランダムに並び替える）
    const choicesContainer = document.getElementById('choices');
    choicesContainer.innerHTML = '';
    
    const shuffledChoices = shuffleArray([...currentQuestion.choices]);
    
    shuffledChoices.forEach(choice => {
        const button = document.createElement('button');
        button.innerText = choice;
        button.onclick = () => checkAnswer(choice, currentQuestion.meaning);
        choicesContainer.appendChild(button);
    });
    
    document.getElementById('score').innerText = `スコア: ${score} / ${currentQuestionIndex + 1}`;
}

// 答え合わせ
function checkAnswer(selected, correct) {
    if (selected === correct) {
        alert("正解！ 🎉");
        score++;
    } else {
        alert(`不正解... 😢\n正解は: 【${correct}】`);
    }
    
    currentQuestionIndex++;
    
    if (currentQuestionIndex < shuffledVocabulary.length) {
        showQuestion();
    } else {
        endGame();
    }
}

// ゲーム終了
function endGame() {
    document.getElementById('game-zone').style.display = 'none';
    document.getElementById('restart-btn').style.display = 'inline-block';
    document.getElementById('title').innerText = `ゲームクリア！\n最終スコア: ${score} / ${vocabulary.length}`;
    
    // ゲームが終わったらBGMを一時停止
    bgm.pause();
}

// もう一度挑戦するボタンの処理
function restartGame() {
    startGame();
}

// 音量調整
function adjustVolume(val) {
    bgm.volume = val;
}

// 初回起動時のイベント（画面のどこかをクリックしたらゲーム＆BGMスタート）
window.addEventListener('click', function startOnFirstClick() {
    startGame();
    window.removeEventListener('click', startOnFirstClick);
}, { once: true });

</script>
</body>
</html>
